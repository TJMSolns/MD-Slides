name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.mill
            ~/.cache/mill
            out
          key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}
          restore-keys: ${{ runner.os }}-mill-

      - name: Install Mill
        run: |
          curl -L https://github.com/com-lihaoyi/mill/releases/download/0.11.6/0.11.6 > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill

      - name: Compile
        run: mill __.compile

      - name: Test
        run: mill __.test

  assembly:
    name: Build Assembly JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Mill
        run: |
          curl -L https://github.com/com-lihaoyi/mill/releases/download/0.11.6/0.11.6 > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill

      - name: Build assembly JAR
        run: mill cli.assembly

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-slides-jar
          path: out/cli/assembly.dest/out.jar
